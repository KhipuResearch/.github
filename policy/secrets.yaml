# secrets.yaml — secret inventory for KR-Labs/.github
#
# Scope: all secrets, implicit or explicit, that touch this repo OR that are
# assumed by the workflow templates it ships to consumer repos.
#
# Key finding from SPEC.md §5.3: "No explicit `secrets.*` references in either
# workflow file. Verified by scan of both files — no lines containing
# `${{ secrets.` syntax." This file makes the *implicit* surface explicit.
---
schema_version: "1.0"
repository: "KR-Labs/.github"
last_reviewed: "<LAST_REVIEW_DATE_TBD>"

# ----------------------------------------------------------------------------
# Direct secrets — secrets used by THIS repo's own operations
# ----------------------------------------------------------------------------
direct_secrets:
  status: "none"
  rationale: >-
    This repo has no self-executing CI (per SPEC.md §2 and DECISION 0001) and
    no runtime. No GitHub Actions secrets, no environment secrets, no
    deployment credentials are referenced or required.

# ----------------------------------------------------------------------------
# Implicit secrets — the ambient GITHUB_TOKEN when a consumer runs a copied
# template
# ----------------------------------------------------------------------------
implicit_secrets:
  - name: "GITHUB_TOKEN"
    kind: "github_ambient"
    consumers:
      - path: "workflows/pr-check.yml"
        step_reference: "pr-check.yml:160"
        used_by_action: "actions/github-script@v7"
        permissions_required:
          - "pull-requests: read"   # label-check reads PR labels
      - path: "workflows/test.yml"
        step_reference: "test.yml:328"
        used_by_action: "github/codeql-action/upload-sarif@v3"
        permissions_required:
          - "security-events: write"   # SARIF upload to code-scanning
    rotation: "managed_by_github"
    rotation_note: "GITHUB_TOKEN is minted per-run by GitHub. Not rotatable by operator."
    risk: "low"

# ----------------------------------------------------------------------------
# Optional secrets — not required by templates but consumers may wire them
# ----------------------------------------------------------------------------
optional_secrets:
  - name: "CODECOV_TOKEN"
    kind: "third_party_api"
    required: false
    rationale: >-
      workflows/test.yml uploads coverage to Codecov at test.yml:88, 160, 209.
      Each upload step is wrapped in `continue-on-error: true` per SPEC.md §5.3
      and §11, so a missing token degrades gracefully rather than failing the
      workflow.
    consumer_action_if_missing: "workflow passes; no coverage telemetry recorded."
    rotation: "<CODECOV_ROTATION_POLICY_TBD>"
    owner: "<CODECOV_ORG_OWNER_TBD>"

# ----------------------------------------------------------------------------
# Non-secret test credentials — documented to distinguish from real secrets
# ----------------------------------------------------------------------------
test_credentials_non_secret:
  - name: "SECRET_KEY"
    value_literal: "test-secret-key-for-ci"
    reference: "test.yml:77 (also :149, :285)"
    rationale: >-
      Matches the safe-credential pattern documented in CI_CD_BEST_PRACTICES.md
      §3 (line 160). The `test-` prefix is intentional and recognized by the
      gitleaks allowlist pattern defined in CI_CD_FIXES_SUMMARY.md §2.
    is_secret: false

  - name: "DATABASE_URL"
    value_pattern: "postgresql://test:test@localhost:5432/<dbname>"
    reference: "test.yml:73-78, 146-150, 282-286"
    rationale: "Ephemeral service-container credentials. localhost-only."
    is_secret: false

  - name: "REDIS_URL"
    value_literal: "redis://localhost:6379/0"
    reference: "test.yml:75, 147, 283"
    is_secret: false

# ----------------------------------------------------------------------------
# Secret-scanning controls
# ----------------------------------------------------------------------------
secret_scanning:
  gitleaksignore_present: false
  gitleaks_toml_present: false
  rationale: >-
    Per SPEC.md §10.2, the `.gitleaksignore` and `.gitleaks.toml` remediation
    described in CI_CD_FIXES_SUMMARY.md §2 was applied to
    `Private IP/krl-data-connectors`, NOT to this .github repo. This repo
    ships only a 10-byte `.gitignore` containing `.DS_Store`.
  recommended_action: "<GITLEAKS_INTRODUCTION_DECISION_TBD>"
  tracking_doc: "CALIBRATION_REQUIRED.md"

# ----------------------------------------------------------------------------
# Consumer contract — what secrets a consumer copying these templates must wire
# ----------------------------------------------------------------------------
consumer_contract:
  required_secrets: []  # none strictly required per SPEC.md §5.3
  recommended_secrets:
    - name: "CODECOV_TOKEN"
      reason: "to record coverage; optional due to continue-on-error."
  assumed_permissions:
    - "pull-requests: read"
    - "security-events: write"
    - "contents: read"
  note: >-
    See DECISION 0003 for the hardcoded path coupling that consumers inherit
    alongside these secret assumptions.

# ----------------------------------------------------------------------------
# Audit cadence
# ----------------------------------------------------------------------------
audit:
  review_frequency: "<REVIEW_FREQUENCY_TBD>"
  last_full_inventory: "<LAST_INVENTORY_DATE_TBD>"
  next_due: "<NEXT_AUDIT_DUE_TBD>"
